{% extends "base.html" %}

{% block title %}Редактирование аптеки{% endblock %}

{% block content %}
    <div class="card">
        <h1>✏️ Редактирование аптеки: {{ pharmacy.name }}</h1>
        
        <form method="POST" action="/edit_pharmacy/{{ pharmacy.id }}" style="max-width: 600px; margin-top: 1.5rem;">
            <div class="form-group">
                <label for="name">Название аптеки <span style="color: red;">*</span>:</label>
                <input type="text" id="name" name="name" required value="{{ pharmacy.name }}">
            </div>
            
            <div class="form-group">
                <label for="address">Адрес:</label>
                <input type="text" id="address" name="address" value="{{ pharmacy.address or '' }}">
            </div>
            
            <div class="form-group">
                <label for="phone">Телефон:</label>
                <input type="tel" id="phone" name="phone" value="{{ pharmacy.phone or '' }}">
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" value="{{ pharmacy.email or '' }}">
            </div>
            
            <div class="form-group">
                <label for="working_hours">Режим работы:</label>
                <input type="text" id="working_hours" name="working_hours" value="{{ pharmacy.working_hours or '' }}">
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" name="is_active" {% if pharmacy.is_active %}checked{% endif %}>
                    Аптека активна
                </label>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-success">💾 Сохранить изменения</button>
                <a href="/pharmacies" class="btn">Отмена</a>
            </div>
        </form>
    </div>
{% endblock %}
